<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- Main Container -->
    <div class="container">
        <!-- Logo -->
<div class="logo">
    📝
</div>

        <!-- App Title -->
        <h1>Todo List</h1>

        <!-- Input Section -->
        <div class="input-section">

            <!-- Todo Input -->
            <input 
                type="text"
                id="todoInput"
                placeholder="Enter your task..."
            />

            <!-- Add Button -->
            <button id="addBtn">
                Add
            </button>

        </div>

        <!-- Todo List Section -->
        <div class="todo-container">

            <!-- Todo List -->
            <ul id="todoList">

                <!-- Example Todo Item -->
                <!--
                <li class="todo-item">

                    <span class="task-text">
                        Learn JavaScript
                    </span>

                    <div class="buttons">

                        <button class="edit-btn">
                            Edit
                        </button>

                        <button class="delete-btn">
                            Delete
                        </button>

                    </div>

                </li>
                -->

            </ul>

        </div>

    </div>

    <!-- JavaScript File -->
    <script src="script.js"></script>

</body>
</html>
